name: update

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Generate PeeringDB data
        run: npm run generate

      - name: Check generated data
        run: npm run check:data

      - name: Update README sizes
        run: npm run update:sizes

      - name: Detect data changes
        id: changes
        run: |
          if git diff --quiet -- dist README.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute package version
        if: steps.changes.outputs.changed == 'true'
        run: npm run set-version -- --date "$(date -u '+%Y%m%d')"

      - name: Generate npm data modules
        if: steps.changes.outputs.changed == 'true'
        run: npm run generate:modules

      - name: Test package
        if: steps.changes.outputs.changed == 'true'
        run: npm test

      - name: Commit and tag release
        if: steps.changes.outputs.changed == 'true'
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          git config --local user.email "dr_hamilton@foxmail.com"
          git config --local user.name "Ravello-H"
          git add -A
          git commit -m "Release v${VERSION}"
          git tag "v${VERSION}"
          git push --follow-tags
